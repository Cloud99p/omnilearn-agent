openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: anthropic
    description: Anthropic AI chat operations
  - name: skills
    description: Agent skills management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /anthropic/conversations:
    get:
      operationId: listConversations
      tags: [anthropic]
      summary: List conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /anthropic/conversations/{conversationId}:
    get:
      operationId: getConversation
      tags: [anthropic]
      summary: Get a conversation with its messages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
    delete:
      operationId: deleteConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /anthropic/conversations/{conversationId}/messages/stream:
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and stream the response
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of response chunks
          content:
            text/event-stream:
              schema:
                type: string

  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: List all skills
      responses:
        "200":
          description: List of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
    post:
      operationId: createSkill
      tags: [skills]
      summary: Create or install a skill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSkillBody"
      responses:
        "201":
          description: Created skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"

  /skills/{skillId}:
    delete:
      operationId: deleteSkill
      tags: [skills]
      summary: Uninstall a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Conversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        mode:
          type: string
        createdAt:
          type: string
      required: [id, title, mode, createdAt]

    CreateConversationBody:
      type: object
      properties:
        title:
          type: string
        mode:
          type: string
      required: [title, mode]

    ConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        mode:
          type: string
        createdAt:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required: [id, title, mode, createdAt, messages]

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
      required: [id, conversationId, role, content, createdAt]

    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
        installedSkillIds:
          type: array
          items:
            type: integer
      required: [content]

    Skill:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        systemPrompt:
          type: string
        category:
          type: string
        isBuiltIn:
          type: boolean
        isInstalled:
          type: boolean
        createdAt:
          type: string
      required: [id, name, description, icon, systemPrompt, category, isBuiltIn, isInstalled, createdAt]

    CreateSkillBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        systemPrompt:
          type: string
        category:
          type: string
        isBuiltIn:
          type: boolean
        isInstalled:
          type: boolean
      required: [name, description, systemPrompt, category]
