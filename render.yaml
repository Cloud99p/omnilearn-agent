# Render Blueprint - Deploys API Server + PostgreSQL
# https://render.com/docs/blueprint-spec

services:
  # API Server Service
  - type: web
    name: omnilearn-api
    env: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: omnilearn-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/healthz
    autoDeploy: true

databases:
  # PostgreSQL Database
  - name: omnilearn-db
    databaseName: omnilearn
    user: omnilearn
    plan: starter
    region: oregon
