app = "omnilearn-agent"
primary_region = "ams"  # Amsterdam (closest to Nigeria)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[mounts]]
  source = "omnilearn_data"
  destination = "/data"
  initial_size = "3gb"
