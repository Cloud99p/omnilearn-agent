# OmniLearn Agent - Single Server Deployment
# For production use with external services (Supabase, Clerk, etc.)
# 
# This is for LOCAL DEVELOPMENT or SIMPLE SINGLE-SERVER DEPLOYMENT
# For full production deployment, see DEPLOYMENT-CHECKLIST.md

version: '3.8'

services:
  # PostgreSQL Database (for local dev only - use Supabase in production)
  postgres:
    image: postgres:15-alpine
    container_name: omnilearn-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-omnilearn123}
      POSTGRES_DB: omnilearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - local-dev  # Only start this for local development

  # Backend API Server
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnilearn-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}  # Required: Supabase connection string
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}  # Required
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}  # Required
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}  # Required
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Vercel is recommended for production)
  # This is for local development only
  frontend:
    build:
      context: ./artifacts/omnilearn
      dockerfile: ../../Dockerfile.frontend
    container_name: omnilearn-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    ports:
      - "3000:80"
    depends_on:
      - api-server
    restart: unless-stopped
    profiles:
      - local-dev  # Only start this for local development

volumes:
  postgres_data:

networks:
  default:
    name: omnilearn-network
